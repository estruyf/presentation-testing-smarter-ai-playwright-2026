title: Cleaning
description: ''
version: 3
timer: 50
scenes:
  - title: Post-session cleanup
    description: Restore system settings after the session
    moves:
      - action: closeAll
      - action: closeTerminal
        terminalId: DemoTime
      - action: closeTerminal
        terminalId: serve
      - action: macos.disableFocusMode
      - action: macos.disableCaffeine
      - action: macos.showMenubar
      - action: executeVSCodeCommand
        command: workbench.action.activityBarLocation.default
      - action: executeVSCodeCommand
        command: showCustomTitleBar
      - action: executeVSCodeCommand
        command: workbench.action.toggleFullScreen
