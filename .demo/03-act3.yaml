title: Act 3 — Playwright Test Agents
description: ''
version: 3
timer: 50
engageTime:
  sessionId: 21333k
scenes:
  - title: Planner
    description: Planner explores the app and writes a human-readable test plan
    moves:
      - action: setTheme
        theme: Demo Time Dark
      - action: executeVSCodeCommand
        command: workbench.action.closePanel
      - action: openSlide
        path: .demo/slides/03.01-ai-solution-quote.md
  - title: Init
    moves:
      - action: executeTerminalCommand
        command: npx playwright init-agents --loop=vscode
        terminalId: DemoTime
  - title: Seed file
    moves:
      - action: setTheme
        theme: Demo Time Light (no italic)
      - action: open
        path: tests/seed.spec.ts
        focusTop: true
  - title: Planner file
    moves:
      - action: open
        path: .github/agents/playwright-test-planner.agent.md
        focusTop: true
  - title: Run the planner
    moves:
      - action: newCopilotChat
      - action: customCopilotChat
        mode: playwright-test-planner
      - action: typeText
        content: Generate a full test plan for the document submission workflow. Use tests/seed.spec.ts as the seed. Cover both the submitter persona (Alex Chen) and the approver persona (Morgan Lee). Include happy paths, validation errors, and edge cases. Save the output to specs/approval-workflow.md
        insertTypingSpeed: 2
      - action: pressEnter
  - title: Open the specs
    moves:
      - action: open
        path: specs/approval-workflow.md
        focusTop: true
  - title: Generator
    description: Generator turns the Markdown plan into executable TypeScript tests
    moves:
      - action: closeCopilotChat
      - action: executeVSCodeCommand
        command: workbench.action.closePanel
      - action: openSlide
        path: .demo/slides/03.02-generator.md
  - title: Generator agent
    moves:
      - action: insert
        path: .github/agents/playwright-test-generator.agent.md
        contentPath: .demo/code/generator.specifics.md
        position: end
      - action: waitForTimeout
        timeout: 200
      - action: open
        path: .github/agents/playwright-test-generator.agent.md
        focusTop: true
  - title: Generator agent run
    moves:
      - action: newCopilotChat
      - action: customCopilotChat
        mode: playwright-test-generator
      - action: typeText
        content: 'Generate Playwright tests from specs/approval-workflow.md. Use tests/seed.spec.ts as the style reference. Import fixtures from tests/fixtures.ts. For the approver persona tests, use storageState: STORAGE_STATE_APPROVER. Verify every selector live before writing it.'
        insertTypingSpeed: 2
      - action: pressEnter
  - title: Generator output
    moves:
      - action: setTheme
        theme: Demo Time Light (no italic)
      - action: open
        path: tests/approval/submit-document.spec.ts
        focusTop: true
      - action: pause
      - action: highlight
        path: tests/approval/submit-document.spec.ts
        position: '11:20'
        highlightBlur: 2
        highlightOpacity: 0.3
        zoom: 2
  - title: Run the generated tests
    moves:
      - action: executeTerminalCommand
        command: npx playwright test tests/approval/submit-document.spec.ts --project=chromium
        terminalId: DemoTime
  - id: scene-mosmbwmf-5sj3
    title: Question 6
    moves:
      - action: showEngageTimePoll
        pollId: hcozgc
  - title: Healer
    description: CI breaks. AI diagnoses root cause instead of 400 lines of logs.
    moves:
      - action: setTheme
        theme: Demo Time Dark (no italic)
      - action: closeCopilotChat
      - action: executeVSCodeCommand
        command: workbench.action.closePanel
      - action: openSlide
        path: .demo/slides/03.03-healer.md
  - title: Failing test
    moves:
      - action: setTheme
        theme: Demo Time Light (no italic)
      - action: executeTerminalCommand
        command: npm run test:broken
        terminalId: DemoTime
  - title: Healer agent file
    moves:
      - action: open
        path: .github/agents/playwright-test-healer.agent.md
        focusTop: true
  - title: Healer agent
    moves:
      - action: newCopilotChat
      - action: customCopilotChat
        mode: playwright-test-healer
      - action: typeText
        content: Fix the failing tests in tests/approval/broken-for-healer.spec.ts. Run the tests first to see the exact failures. Then inspect the live app to find the correct current selectors. Fix only this test file, don't change any other files.  Make sure the tests pass at the end.
        insertTypingSpeed: 0
      - action: pressEnter
  - title: Run failing test again
    moves:
      - action: create
        path: tests/approval/broken-for-healer.spec.ts
        contentPath: .demo/code/broken-for-healer-fixed.spec.ts
      - action: executeTerminalCommand
        command: npm run test:broken
        terminalId: DemoTime
  - id: scene-mosmpyap-gfxl
    title: Open changes
    moves:
      - action: open
        path: tests/approval/broken-for-healer.spec.ts
      - action: waitForTimeout
        timeout: 500
      - action: executeVSCodeCommand
        command: git.openChange
