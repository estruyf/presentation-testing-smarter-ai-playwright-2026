title: "Act 2 — Playwright Test Agents"
description: ""
version: 3
timer: 50
scenes:
  - title: Planner
    description: Planner explores the app and writes a human-readable test plan
    moves:
      - action: openSlide
        path: ".demo/slides/04-ai-solution-quote.md"
  - title: Init
    moves:
      - action: executeTerminalCommand
        command: npx playwright init-agents --loop=vscode
        terminalId: DemoTime
  - title: Seed file
    moves:
      - action: open
        path: tests/seed.spec.ts
        focusTop: true
  - title: Planner file
    moves:
      - action: open
        path: ".github/agents/playwright-test-planner.agent.md"
        focusTop: true
  - title: Run the planner
    moves:
      - action: newCopilotChat
      - action: customCopilotChat
        mode: playwright-test-planner
        message: "Generate a full test plan for the document submission workflow.
          Use tests/seed.spec.ts as the seed. Cover both the submitter persona (Alex Chen)
          and the approver persona (Morgan Lee). Include happy paths, validation errors,
          and edge cases. Save the output to specs/approval-workflow.md"
  - title: Open the specs
    moves:
      - action: open
        path: specs/approval-workflow.md
        focusTop: true
  - title: Generator
    description: Generator turns the Markdown plan into executable TypeScript tests
    moves:
      - action: openSlide
        path: ".demo/slides/05-generator.md"
  - title: Generator agent
    moves:
      - action: insert
        path: .github/agents/playwright-test-generator.agent.md
        contentPath: .demo/code/generator.specifics.md
        position: end
      - action: open
        path: .github/agents/playwright-test-generator.agent.md
        focusTop: true
  - title: Generator agent
    moves:
      - action: newCopilotChat
      - action: customCopilotChat
        mode: playwright-test-generator
        message: "Generate Playwright tests from specs/approval-workflow.md.
          Use tests/seed.spec.ts as the style reference. Import fixtures from tests/fixtures.ts.
          For the approver persona tests, use storageState: STORAGE_STATE_APPROVER. Verify
          every selector live before writing it."
  - title: Generator output
    moves:
      - action: open
        path: tests/approval/submit-document.spec.ts
        focusTop: true
      - action: pause
      - action: highlight
        path: tests/approval/submit-document.spec.ts
        position: 11:20
        highlightBlur: 2
        highlightOpacity: 0.3
        zoom: 2
  - title: Run the generated tests
    moves:
      - action: executeTerminalCommand
        command: npx playwright test tests/approval/submit-document.spec.ts --project=chromium
        terminalId: DemoTime
  - title: AI failure analysis
    description: CI breaks. AI diagnoses root cause instead of 400 lines of logs.
    moves:
      - action: openSlide
        path: ".demo/slides/06-ci-breaks.md"
  - title: Run the generated tests
    moves:
      - action: open
        path: ".github/workflows/playwright.yml"
        focusTop: true
      - action: highlight
        path: ".github/workflows/playwright.yml"
        startPlaceholder: "# AI FAILURE ANALYSIS"
        endPlaceholder: node scripts/analyze-failures.js
        highlightBlur: 3
        highlightOpacity: 0.35
      - action: open
        path: scripts/analyze-failures.js
        focusTop: true
      - action: highlight
        path: scripts/analyze-failures.js
        startPlaceholder: function buildPrompt(
        endPlaceholder: const total = results.stats
        highlightBlur: 2
      - action: showInfoMessage
        message: "First: gh copilot explain on one error. Then the full script handles
          the whole suite."
      - action: executeTerminalCommand
        command: 'gh copilot explain "Playwright Error: locator(''.submit-btn'') strict
          mode violation: resolved to 0 elements"'
        terminalId: DemoTime
      - action: showInfoMessage
        message: Useful for one error in the terminal. Now watch the full script handle
          all failures and post a PR comment.
      - action: executeTerminalCommand
        command: npm run test:broken -- --reporter=json 2>/dev/null; npm run analyze
        terminalId: DemoTime
      - action: waitForInput
        message: Wait for analysis to complete, then press Enter to open the summary
      - action: open
        path: test-results/ai-summary.md
        focusTop: true
  - title: Act 2c — Healer agent
    description: Healer replays the failure, inspects the live DOM, and patches the
      test
    icons:
      start: wrench
      end: check
    moves:
      - action: openSlide
        path: ".demo/slides/17-failure-analysis.md"
      - action: open
        path: tests/approval/broken-for-healer.spec.ts
        focusTop: true
      - action: showInfoMessage
        message: "The manual path: ask gh copilot suggest what to do. Then we'll automate
          the whole thing with the Healer."
      - action: executeTerminalCommand
        command: gh copilot suggest -t shell "find all button text labels currently rendered
          on the page at http://localhost:3000 using playwright CLI"
        terminalId: DemoTime
      - action: showInfoMessage
        message: gh copilot suggest gets you a command to run manually. The Healer navigates
          the live app, finds the replacement, and patches the file — no copy-pasting
          required.
      - action: open
        path: ".github/agents/healer.md"
        focusTop: true
      - action: newCopilotChat
      - action: agentCopilotChat
        message: "@healer Fix the failing tests in tests/approval/broken-for-healer.spec.ts.
          Run the tests first to see the exact failures. Then inspect the live app to
          find the correct current selectors. Patch only the broken locators. Re-run after
          patching to confirm everything passes."
      - action: waitForInput
        message: Wait for the Healer to finish patching and re-running, then press Enter
      - action: open
        path: tests/approval/broken-for-healer.spec.ts
        focusTop: true
      - action: executeTerminalCommand
        command: npm run test:broken
        terminalId: DemoTime
  - title: Act 3 — The resilient setup
    description: Pre-auth sessions + agents + Copilot Coding Agent closing the loop
    icons:
      start: shield
      end: rocket
    moves:
      - action: openSlide
        path: ".demo/slides/18-healer.md"
      - action: openSlide
        path: ".demo/slides/19-act3.md"
      - action: open
        path: playwright.config.ts
        focusTop: true
      - action: highlight
        path: playwright.config.ts
        startPlaceholder: "// Setup: create auth sessions"
        endPlaceholder: 'dependencies: ["auth-setup"],'
        highlightBlur: 2
      - action: openSlide
        path: ".demo/slides/20-everything-connected.md"
      - action: open
        path: prompts/copilot-coding-agent.md
        focusTop: true
      - action: waitForInput
        message: Switch to GitHub.com to show the Copilot Coding Agent PR in progress,
          then press Enter
      - action: executeTerminalCommand
        command: npm test
        terminalId: DemoTime
      - action: waitForInput
        message: Full suite complete — press Enter to open the HTML report
      - action: executeTerminalCommand
        command: npm run test:report
        terminalId: DemoTime
  - title: Wrap-up
    description: Before/after summary, resources, and closing slide
    icons:
      start: star-full
      end: heart
    moves:
      - action: openSlide
        path: ".demo/slides/21-coding-agent.md"
      - action: openSlide
        path: ".demo/slides/22-what-changed.md"
      - action: openSlide
        path: ".demo/slides/23-resources.md"
  - title: Post-session cleanup
    description: Restore system settings after the session
    moves:
      - action: closeAll
      - action: closeTerminal
        terminalId: DemoTime
      - action: closeTerminal
        terminalId: serve
      - action: macos.disableFocusMode
      - action: macos.showDock
