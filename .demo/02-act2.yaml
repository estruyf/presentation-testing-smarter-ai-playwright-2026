title: Act 1 — The maintenance loop
description: ''
version: 3
timer: 50
scenes:
  - title: The app concept
    moves:
      - action: openSlide
        path: .demo/slides/02.01-act2.md
  - title: The app
    moves:
      - action: openWebsite
        url: http://localhost:3000
        openInVSCode: true
  - title: Question 3
    moves:
      - action: showEngageTimePoll
        pollId: 20a8w0
        closeOnOpen: false
        startOnOpen: false
  - title: The tests
    moves:
      - action: openSlide
        path: .demo/slides/02.02-test.md
  - title: Auth
    moves:
      - action: openSlide
        path: .demo/slides/02.03-auth.md
  - title: Auth code
    moves:
      - action: setTheme
        theme: Demo Time Light (no italic)
      - action: open
        path: tests/auth/auth.setup.ts
        focusTop: true
      - action: pause
      - action: highlight
        path: tests/auth/auth.setup.ts
        startPlaceholder: authenticate as submitter (Alex Chen)
        endPlaceholder: '});'
        highlightBlur: 2
        highlightOpacity: 0.3
        zoom: 2
      - action: pause
      - action: highlight
        path: tests/auth/auth.setup.ts
        startPlaceholder: authenticate as approver (Morgan Lee)
        endPlaceholder: '});'
        highlightBlur: 2
        highlightOpacity: 0.3
        zoom: 2
  - title: Run authentication
    moves:
      - action: executeTerminalCommand
        command: npm run test:auth
        terminalId: DemoTime
  - title: Show auth file
    moves:
      - action: open
        path: /.auth/submitter.json
      - action: pause
      - action: highlight
        path: /.auth/submitter.json
        position: '6:10'
        highlightBlur: 2
        highlightOpacity: 0.3
        zoom: 2
  - title: The broken tests
    moves:
      - action: open
        path: tests/approval/broken-for-healer.spec.ts
        focusTop: true
      - action: pause
      - action: highlight
        path: tests/approval/broken-for-healer.spec.ts
        startPlaceholder: ' await page.goto("/");'
        endPlaceholder: await expect(page.locator(".submit-modal")).toBeVisible();
        highlightBlur: 3
        highlightOpacity: 0.3
        zoom: 2
      - action: pause
      - action: highlight
        path: tests/approval/broken-for-healer.spec.ts
        position: '34:42'
        highlightBlur: 3
        highlightOpacity: 0.3
        zoom: 2
    icons:
      start: bug
      end: error
  - title: Running the tests
    moves:
      - action: executeTerminalCommand
        command: npm run test:broken
        terminalId: DemoTime
  - title: What exactly went wrong?
    moves:
      - action: executeTerminalCommand
        command: copilot -p "Explain what went wrong with the \"test-results/results.json\" test run output."
        terminalId: DemoTime
    icons:
      start: question
      end: search
  - title: AI ID management
    moves:
      - action: setTheme
        theme: Demo Time Dark
      - action: openSlide
        path: .demo/slides/02.04-ai-id-management.md
  - title: Show the HTML
    moves:
      - action: open
        path: apps/approval-portal/index.html
      - action: pause
      - action: highlight
        path: apps/approval-portal/index.html
        position: '23:36'
        highlightBlur: 3
        highlightOpacity: 0.3
        zoom: 2
  - title: Generate test IDs
    moves:
      - action: newCopilotChat
      - action: customCopilotChat
        mode: playwright-test-healer
        message: Analyse the website in `./apps/approval-portal` and check which components are important for end-to-end testing. Add `data-testid` attributes to those components. Add all the retrieved and created test IDs in a TypeScript constant file under `apps/approval-portal/src/constants/testIds.ts`.  That way, it's easier to reuse in E2E tests later.
  - title: Show the HTML
    moves:
      - action: create
        path: apps/approval-portal/index.html
        contentPath: .demo/code/index.testids.html
      - action: open
        path: apps/approval-portal/index.html
      - action: pause
      - action: highlight
        path: apps/approval-portal/index.html
        position: '23:36'
        highlightBlur: 3
        highlightOpacity: 0.3
        zoom: 2
  - title: Show the constants file
    moves:
      - action: create
        path: apps/approval-portal/src/constants/testIds.ts
        contentPath: .demo/code/testIds.ts
      - action: open
        path: apps/approval-portal/src/constants/testIds.ts
