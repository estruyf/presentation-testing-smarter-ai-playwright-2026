title: "Act 1 — The maintenance loop"
description: ""
version: 3
timer: 50
scenes:
  - title: The app concept
    moves:
      - action: openSlide
        path: ".demo/slides/02-act1.md"
  - title: The app
    moves:
      - action: openWebsite
        url: http://localhost:3000
        openInVSCode: true
  - title: Auth
    moves:
      - action: openSlide
        path: ".demo/slides/03-auth.md"
  - title: Auth code
    moves:
      - action: open
        path: tests/auth/auth.setup.ts
        focusTop: true
      - action: pause
      - action: highlight
        path: tests/auth/auth.setup.ts
        startPlaceholder: authenticate as submitter (Alex Chen)
        endPlaceholder: "});"
        highlightBlur: 2
        highlightOpacity: 0.3
        zoom: 2
      - action: pause
      - action: highlight
        path: tests/auth/auth.setup.ts
        startPlaceholder: authenticate as approver (Morgan Lee)
        endPlaceholder: "});"
        highlightBlur: 2
        highlightOpacity: 0.3
        zoom: 2
  - title: Run authentication
    moves:
      - action: executeTerminalCommand
        command: npm run test:auth
        terminalId: DemoTime
  - title: Show auth file
    moves:
      - action: open
        path: /.auth/submitter.json
      - action: pause
      - action: highlight
        path: /.auth/submitter.json
        position: 7:10
        highlightBlur: 2
        highlightOpacity: 0.3
        zoom: 2
  - title: The broken tests
    icons:
      start: bug
      end: error
    moves:
      - action: open
        path: tests/approval/broken-for-healer.spec.ts
        focusTop: true
      - action: pause
      - action: highlight
        path: tests/approval/broken-for-healer.spec.ts
        startPlaceholder: 'await page.getByRole("button", { name: "New request" })'
        endPlaceholder: await expect(page.locator(".submit-modal")).toBeVisible();
        highlightBlur: 3
        highlightOpacity: 0.3
        zoom: 2
  - title: Running the tests
    icons:
      start: bug
      end: error
    moves:
      - action: executeTerminalCommand
        command: npm run test:broken
        terminalId: DemoTime
        autoExecute: true
      - action: executeTerminalCommand
        command: 'gh copilot explain "Playwright TimeoutError: locator.click: Timeout
          30000ms exceeded. Waiting for getByRole(''button'', { name: ''New request''
          }) — 0 elements found"'
        terminalId: DemoTime
        autoExecute: true
      - action: showInfoMessage
        message: gh copilot explain gives you a quick answer — but it only sees what you
          paste in. The full analysis sees every failure at once.
  - title: "Act 2a — Playwright Test Agents: Planner"
    description: Planner explores the app and writes a human-readable test plan
    icons:
      start: search
      end: book
    notes:
      path: SPEAKER_NOTES.md
    moves:
      - action: openSlide
        path: ".demo/slides/11-ai-solution-quote.md"
      - action: openSlide
        path: ".demo/slides/12-act2.md"
      - action: openSlide
        path: ".demo/slides/13-test-agents.md"
      - action: open
        path: tests/seed.spec.ts
        focusTop: true
      - action: executeTerminalCommand
        command: npm run agents:init
        terminalId: DemoTime
        autoExecute: true
      - action: open
        path: ".github/agents/planner.md"
        focusTop: true
      - action: newCopilotChat
      - action: agentCopilotChat
        message: "@planner Generate a full test plan for the document submission workflow.
          Use tests/seed.spec.ts as the seed. Cover both the submitter persona (Alex Chen)
          and the approver persona (Morgan Lee). Include happy paths, validation errors,
          and edge cases. Save the output to specs/approval-workflow.md"
      - action: waitForInput
        message: Wait for the Planner to finish, then press Enter to continue
      - action: open
        path: specs/approval-workflow.md
        focusTop: true
  - title: "Act 2a — Playwright Test Agents: Generator"
    description: Generator turns the Markdown plan into executable TypeScript tests
    icons:
      start: code
      end: pass
    notes:
      path: SPEAKER_NOTES.md
    moves:
      - action: openSlide
        path: ".demo/slides/14-planner.md"
      - action: open
        path: ".github/agents/generator.md"
        focusTop: true
      - action: newCopilotChat
      - action: agentCopilotChat
        message: "@generator Generate Playwright tests from specs/approval-workflow.md.
          Use tests/seed.spec.ts as the style reference. Import fixtures from tests/fixtures.ts.
          For the approver persona tests, use storageState: STORAGE_STATE_APPROVER. Verify
          every selector live before writing it. Run each generated file after creating
          it to confirm it passes."
      - action: waitForInput
        message: Wait for the Generator to finish writing and running the tests, then
          press Enter
      - action: open
        path: tests/approval/submit-document.spec.ts
        focusTop: true
      - action: highlight
        path: tests/approval/submit-document.spec.ts
        startPlaceholder: import { test, expect } from "../fixtures";
        endPlaceholder: test.describe("document submission",
        highlightBlur: 2
      - action: executeTerminalCommand
        command: npx playwright test tests/approval/submit-document.spec.ts --project=chromium
        terminalId: DemoTime
        autoExecute: true
  - title: Act 2b — AI failure analysis
    description: CI breaks. AI diagnoses root cause instead of 400 lines of logs.
    icons:
      start: beaker
      end: comment-discussion
    notes:
      path: SPEAKER_NOTES.md
    moves:
      - action: openSlide
        path: ".demo/slides/15-generator.md"
      - action: openSlide
        path: ".demo/slides/16-ci-breaks.md"
      - action: open
        path: ".github/workflows/playwright.yml"
        focusTop: true
      - action: highlight
        path: ".github/workflows/playwright.yml"
        startPlaceholder: "# AI FAILURE ANALYSIS"
        endPlaceholder: node scripts/analyze-failures.js
        highlightBlur: 3
        highlightOpacity: 0.35
      - action: open
        path: scripts/analyze-failures.js
        focusTop: true
      - action: highlight
        path: scripts/analyze-failures.js
        startPlaceholder: function buildPrompt(
        endPlaceholder: const total = results.stats
        highlightBlur: 2
      - action: showInfoMessage
        message: "First: gh copilot explain on one error. Then the full script handles
          the whole suite."
      - action: executeTerminalCommand
        command: 'gh copilot explain "Playwright Error: locator(''.submit-btn'') strict
          mode violation: resolved to 0 elements"'
        terminalId: DemoTime
        autoExecute: true
      - action: showInfoMessage
        message: Useful for one error in the terminal. Now watch the full script handle
          all failures and post a PR comment.
      - action: executeTerminalCommand
        command: npm run test:broken -- --reporter=json 2>/dev/null; npm run analyze
        terminalId: DemoTime
        autoExecute: true
      - action: waitForInput
        message: Wait for analysis to complete, then press Enter to open the summary
      - action: open
        path: test-results/ai-summary.md
        focusTop: true
  - title: Act 2c — Healer agent
    description: Healer replays the failure, inspects the live DOM, and patches the
      test
    icons:
      start: wrench
      end: check
    notes:
      path: SPEAKER_NOTES.md
    moves:
      - action: openSlide
        path: ".demo/slides/17-failure-analysis.md"
      - action: open
        path: tests/approval/broken-for-healer.spec.ts
        focusTop: true
      - action: showInfoMessage
        message: "The manual path: ask gh copilot suggest what to do. Then we'll automate
          the whole thing with the Healer."
      - action: executeTerminalCommand
        command: gh copilot suggest -t shell "find all button text labels currently rendered
          on the page at http://localhost:3000 using playwright CLI"
        terminalId: DemoTime
        autoExecute: true
      - action: showInfoMessage
        message: gh copilot suggest gets you a command to run manually. The Healer navigates
          the live app, finds the replacement, and patches the file — no copy-pasting
          required.
      - action: open
        path: ".github/agents/healer.md"
        focusTop: true
      - action: newCopilotChat
      - action: agentCopilotChat
        message: "@healer Fix the failing tests in tests/approval/broken-for-healer.spec.ts.
          Run the tests first to see the exact failures. Then inspect the live app to
          find the correct current selectors. Patch only the broken locators. Re-run after
          patching to confirm everything passes."
      - action: waitForInput
        message: Wait for the Healer to finish patching and re-running, then press Enter
      - action: open
        path: tests/approval/broken-for-healer.spec.ts
        focusTop: true
      - action: executeTerminalCommand
        command: npm run test:broken
        terminalId: DemoTime
        autoExecute: true
  - title: Act 3 — The resilient setup
    description: Pre-auth sessions + agents + Copilot Coding Agent closing the loop
    icons:
      start: shield
      end: rocket
    notes:
      path: SPEAKER_NOTES.md
    moves:
      - action: openSlide
        path: ".demo/slides/18-healer.md"
      - action: openSlide
        path: ".demo/slides/19-act3.md"
      - action: open
        path: playwright.config.ts
        focusTop: true
      - action: highlight
        path: playwright.config.ts
        startPlaceholder: "// Setup: create auth sessions"
        endPlaceholder: 'dependencies: ["auth-setup"],'
        highlightBlur: 2
      - action: openSlide
        path: ".demo/slides/20-everything-connected.md"
      - action: open
        path: prompts/copilot-coding-agent.md
        focusTop: true
      - action: waitForInput
        message: Switch to GitHub.com to show the Copilot Coding Agent PR in progress,
          then press Enter
      - action: executeTerminalCommand
        command: npm test
        terminalId: DemoTime
        autoExecute: true
      - action: waitForInput
        message: Full suite complete — press Enter to open the HTML report
      - action: executeTerminalCommand
        command: npm run test:report
        terminalId: DemoTime
        autoExecute: true
  - title: Wrap-up
    description: Before/after summary, resources, and closing slide
    icons:
      start: star-full
      end: heart
    moves:
      - action: openSlide
        path: ".demo/slides/21-coding-agent.md"
      - action: openSlide
        path: ".demo/slides/22-what-changed.md"
      - action: openSlide
        path: ".demo/slides/23-resources.md"
  - title: Post-session cleanup
    description: Restore system settings after the session
    moves:
      - action: closeAll
      - action: closeTerminal
        terminalId: DemoTime
      - action: closeTerminal
        terminalId: serve
      - action: macos.disableFocusMode
      - action: macos.showDock
