title: "Act 1 — The maintenance loop"
description: ""
version: 3
timer: 50
scenes:
  - title: The app concept
    moves:
      - action: openSlide
        path: ".demo/slides/02-act1.md"
  - title: The app
    moves:
      - action: openWebsite
        url: http://localhost:3000
        openInVSCode: true
  - title: Auth
    moves:
      - action: openSlide
        path: ".demo/slides/03-auth.md"
  - title: Auth code
    moves:
      - action: open
        path: tests/auth/auth.setup.ts
        focusTop: true
      - action: pause
      - action: highlight
        path: tests/auth/auth.setup.ts
        startPlaceholder: authenticate as submitter (Alex Chen)
        endPlaceholder: "});"
        highlightBlur: 2
        highlightOpacity: 0.3
        zoom: 2
      - action: pause
      - action: highlight
        path: tests/auth/auth.setup.ts
        startPlaceholder: authenticate as approver (Morgan Lee)
        endPlaceholder: "});"
        highlightBlur: 2
        highlightOpacity: 0.3
        zoom: 2
  - title: Run authentication
    moves:
      - action: executeTerminalCommand
        command: npm run test:auth
        terminalId: DemoTime
  - title: Show auth file
    moves:
      - action: open
        path: /.auth/submitter.json
      - action: pause
      - action: highlight
        path: /.auth/submitter.json
        position: 7:10
        highlightBlur: 2
        highlightOpacity: 0.3
        zoom: 2
  - title: The broken tests
    icons:
      start: bug
      end: error
    moves:
      - action: open
        path: tests/approval/broken-for-healer.spec.ts
        focusTop: true
      - action: pause
      - action: highlight
        path: tests/approval/broken-for-healer.spec.ts
        startPlaceholder: 'await page.getByRole("button", { name: "New request" })'
        endPlaceholder: await expect(page.locator(".submit-modal")).toBeVisible();
        highlightBlur: 3
        highlightOpacity: 0.3
        zoom: 2
  - title: Running the tests
    icons:
      start: bug
      end: error
    moves:
      - action: executeTerminalCommand
        command: npm run test:broken
        terminalId: DemoTime
  - title: What exactly went wrong?
    icons:
      start: question
      end: search
    moves:
      - action: executeTerminalCommand
        command: 'copilot -p "Explain what went wrong with the \"test-results/results.json\" test run output."'
        terminalId: DemoTime