name: Playwright E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Run Playwright tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        id: playwright
        run: npx playwright test --reporter=html,json,list
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14

      # ----------------------------------------------------------------
      # AI FAILURE ANALYSIS
      # Demo talking point:
      #   When tests fail, this step passes the JSON results to Claude
      #   and gets a concise root-cause summary posted as a PR comment.
      #   No more hunting through 400 lines of CI logs at 11pm.
      # ----------------------------------------------------------------
      - name: Analyse test failures with AI
        if: failure() && steps.playwright.outcome == 'failure'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node scripts/analyze-failures.js

      - name: Post failure summary as PR comment
        if: failure() && github.event_name == 'pull_request' && steps.playwright.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync('test-results/ai-summary.md')) return;
            const summary = fs.readFileSync('test-results/ai-summary.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });

      - name: Fail job if tests failed
        if: steps.playwright.outcome == 'failure'
        run: exit 1
